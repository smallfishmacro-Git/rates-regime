name: Fetch FRED Data

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 22:00 UTC Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_fred.py
      - name: Commit and push if data updated
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/smallfishmacro-Git/rates-regime.git
          git add data/fred.json
          git diff --cached --quiet || git commit -m "data: fred $(date +%F)"
          git push
        continue-on-error: true
