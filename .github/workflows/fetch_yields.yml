name: Fetch Nominal Yields

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 21:30 UTC Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch nominal yields
        env:
          MARKET_RADAR_COOKIES: ${{ secrets.MARKET_RADAR_COOKIES }}
        run: python fetch_nominal_yields.py

      - name: Commit and push if data updated
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/smallfishmacro-Git/rates-regime.git
          git add data/nominal_yields.csv
          git diff --cached --quiet || git commit -m "data: nominal yields $(date +%F)"
          git push
        continue-on-error: true
