name: Fetch Backtest Assets

on:
  schedule:
    - cron: '25 22 * * 1-5'  # 22:25 UTC Mon-Fri (after fetch_curve_regime)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas
      - name: Fetch backtest asset prices
        run: python fetch_backtest_assets.py
      - name: Commit and push if data updated
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/smallfishmacro-Git/rates-regime.git
          git add data/backtest_assets.json
          git diff --cached --quiet || git commit -m "data: backtest assets $(date +%F)"
          git pull --no-rebase --no-edit
          git push
        continue-on-error: true
