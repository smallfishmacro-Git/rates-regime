name: Daily SOFR Data Update

on:
  schedule:
    # Run at 22:00 UTC (after US market close) on weekdays
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-sofr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch SOFR futures data
        run: python scripts/fetch_sofr.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet public/data/sofr.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in sofr.json"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/sofr.json
          git commit -m "📊 Daily SOFR data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
