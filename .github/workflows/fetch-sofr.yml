name: Daily SOFR Data Update

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-sofr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch SOFR futures data
        run: python scripts/fetch_sofr.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smallfish-rates/public/data/sofr.json
          git diff --cached --quiet || git commit -m "📊 SOFR update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
